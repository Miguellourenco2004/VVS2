name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Testes Unitários e de Integração
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Unit Tests (Service & Discover)
        # Corre apenas os testes dentro das pastas service e discover
        run: mvn test -Dtest="com.example.meetings.service.**,com.example.meetings.discover.**"

      - name: Run Integration Tests (Controller & Repository)
        # Corre apenas os testes dentro das pastas controller e repository
        run: mvn test -Dtest="com.example.meetings.controller.**,com.example.meetings.repository.**"

  # JOB 2: Testes E2E
  e2e-tests:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run End-to-End Tests
        # Corre  o ficheiro EndToEndTest
        run: mvn test -Dtest="com.example.meetings.EndToEndTest"